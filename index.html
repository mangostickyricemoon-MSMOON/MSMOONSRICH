<!DOCTYPE html>
<html lang="th">
<header class="site-header">
  <nav>
    <ul>
      <li><a class="btn-home" href="https://www.msmoon.net">MSMoon</a></li>
      <li><a class="btn-playx" href="https://www.msmoon.net/mangoplayx">MangoPlayX</a></li>
      <li><a class="btn-donate" href="https://donate.msmoon.net">Donate</a></li>
    </ul>
  </nav>
</header>

<head>
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <meta charset="UTF-8">
  <title>MSMOON'S RICH</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
  <link rel="stylesheet" href="style.css">
</head>

<body>
  
  <!-- Canvas -->
  <!-- เลือกขนาด player ด้วย class: player-small | player-medium | player-large -->
  <canvas id="gameCanvas" class="player-medium" width="480" height="800"></canvas>

  <!-- Modal Welcome -->
  <div id="welcomeModal" class="modal">
    <div class="modal-content">
      <h2>WELCOME TO MSMOON'S RICH</h2>
      <input type="text" id="playerNameInput" maxlength="12" placeholder="Name (12 characters max)">
      <button id="startBtn">OK</button>
    </div>
  </div>

  <!-- Countdown Overlay -->
  <div id="countdown" class="hidden"></div>

  <!-- Control bar -->
  <div class="control-bar">
    <button id="fullscreenBtn">Fullscreen</button>
  </div>


  <!-- Modal Score -->
  <div id="scoreModal" class="modal hidden">
    <div class="modal-content">
      <h2>FINISHED!</h2>
      <p id="finalScore"></p>
      <button id="restartBtn">Play Again</button>
    </div>
  </div>


  <!-- Modal Exit -->
<div id="pauseModal" class="modal hidden">
  <div class="modal-content">
    <p>Do you want to exit the game?</p>
    <div class="btn-group">
      <button id="exitBtn" class="btn-exit">Exit</button>
      <button id="cancelBtn" class="btn-resume">Resume</button>
    </div>
  </div>
</div>




  <script src="script.js"></script>
</body>
</html>
